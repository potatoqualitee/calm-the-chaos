<!DOCTYPE html>
<html>

<head>
  <title>Calm the Chaos</title>
  <style>
  :root {
    --primary: #2196f3;
    --primary-light: #64b5f6;
    --background: #1e1e1e;
    --surface: #2d2d2d;
    --surface-raised: #363636;
    --text: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.9);
    --border-color: rgba(255, 255, 255, 0.15);
    --spacing: 1rem;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --background: #ffffff;
      --surface: #f5f5f5;
      --surface-raised: #eeeeee;
      --text: #1a1a1a;
      --text-secondary: rgba(0, 0, 0, 0.85);
      --border-color: rgba(0, 0, 0, 0.1);
    }
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 380px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: var(--background);
    color: var(--text);
    line-height: 1.5;
  }

  .container {
    padding: 1.25rem;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1.25rem;
    margin: -1.25rem -1.25rem 1.25rem -1.25rem;
    background: linear-gradient(to bottom, var(--surface-raised), var(--surface));
    border-bottom: 1px solid var(--border-color);
  }

  .title-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }

  .logo {
    width: 32px;
    height: 32px;
  }

  .title {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--primary);
    text-align: center;
    margin: 0;
  }

  .settings-link {
    text-align: center;
    color: var(--primary);
    text-decoration: none;
    font-size: 0.9rem;
    padding: 0.5rem;
    border-radius: 0.375rem;
    transition: background-color 0.2s;
    cursor: pointer;
  }

  .settings-link:hover {
    background: rgba(33, 150, 243, 0.1);
  }

  /* URL Section */
  .url-section {
    margin-bottom: 1.5rem;
  }

  .url-info {
    font-size: 0.875rem;
    color: var(--text);
    margin-bottom: 1rem;
    padding: 0.75rem 1rem;
    background: var(--surface-raised);
    border-radius: 0.5rem;
    border: 1px solid var(--border-color);
    word-break: break-all;
  }

  /* Toggle Switch */
  .toggle-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem;
    color: var(--text);
    font-size: 1rem;
    font-weight: 500;
  }

  .toggle {
    position: relative;
    width: 3rem;
    height: 1.75rem;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(128, 128, 128, 0.3);
    transition: 0.3s;
    border-radius: 2rem;
  }

  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 1.25rem;
    width: 1.25rem;
    left: 0.25rem;
    bottom: 0.25rem;
    background-color: white;
    transition: 0.3s;
    border-radius: 50%;
  }

  input:checked + .toggle-slider {
    background-color: var(--primary);
  }

  input:checked + .toggle-slider:before {
    transform: translateX(1.25rem);
  }

  /* Stats Section */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface-raised);
    padding: 1rem;
    border-radius: 0.5rem;
    text-align: center;
    border: 1px solid var(--border-color);
  }

  .stat-label {
    font-size: 0.875rem;
    color: var(--text);
    margin-bottom: 0.5rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stat-value {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--primary);
  }

  /* Keywords Section */
  .keywords-title {
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 0.75rem;
    padding: 0 0.5rem;
    font-weight: 500;
  }

  .keywords-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0 0.5rem;
  }

  .keyword-pill {
    background: rgba(255, 255, 255, 0.05);
    padding: 0.375rem 0.75rem;
    border-radius: 1rem;
    font-size: 0.875rem;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0.5rem;
  }

  .keyword-count {
    color: var(--primary);
    font-size: 0.875rem;
    opacity: 0.9;
  }
  </style>
</head>

<body>
  <div class="container">
    <header class="header">
      <div class="title-container">
        <img src="../images/icon48.png" alt="" class="logo">
        <h1 class="title">Calm the Chaos</h1>
      </div>
      <a href="#" class="settings-link" id="openSettings">Manage Keywords & URLs</a>
    </header>

    <div class="url-section">
      <div class="url-info" id="currentDomain"></div>
      <div class="toggle-container">
        <span>Enable on this URL</span>
        <label class="toggle">
          <input type="checkbox" id="domainToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div id="statsAndKeywords">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Blocked on this page</div>
          <div class="stat-value stat-number">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Blocked since install</div>
          <div class="stat-value stat-number">0</div>
        </div>
      </div>

      <h2 class="keywords-title">Blocked Keywords</h2>
      <div class="keywords-grid" id="blockedKeywords">
        <!-- Keywords will be dynamically inserted here -->
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
