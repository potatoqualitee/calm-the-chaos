<!DOCTYPE html>
<html>

<head>
  <title>Calm the Chaos</title>
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
    }

    .container {
      padding: 20px;
    }

    .domain-info {
      text-align: center;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .stats {
      text-align: center;
      margin-bottom: 20px;
    }

    .stat-item {
      margin: 12px 0;
      font-size: 15px;
    }

    .stat-number {
      font-size: 18px;
      font-weight: bold;
      color: #03a9f4;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
    }

    .toggle-label {
      margin-left: 12px;
      font-size: 15px;
    }

    #domainToggle {
      width: 20px;
      height: 20px;
    }

    #currentDomain {
      word-break: break-all;
      color: #9e9e9e;
      font-size: 13px;
      margin-top: 6px;
    }

    .divider {
      border-top: 1px solid #424242;
      margin: 20px 0;
    }

    .footer {
      text-align: center;
      padding: 12px 0;
      border-top: 1px solid #424242;
    }

    .settings-link {
      color: #03a9f4;
      text-decoration: none;
      font-size: 15px;
      cursor: pointer;
      transition: color 0.3s;
    }

    .settings-link:hover {
      color: #0288d1;
    }

    .keywords {
      text-align: center;
      margin-bottom: 20px;
    }

    .keyword-item {
      margin: 6px 0;
      font-size: 13px;
      color: #b0bec5; /* Lightened color */
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="domain-info">
      <div id="currentDomain"></div>
    </div>

    <div class="stats">
      <div class="stat-item">
        Blocked on this page
        <div class="stat-number">0 (0%)</div>
      </div>

      <div class="stat-item">
        Blocked since install
        <div class="stat-number">0 (0%)</div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="toggle-container">
      <a class="settings-link" id="openSettings">Manage Keywords & Domains</a>
    </div>

    <div class="divider"></div>

    <div class="keywords">
      <div class="stat-item">Blocked Keywords</div>
      <div id="blockedKeywords">
        <!-- Keywords will be dynamically inserted here -->
      </div>
    </div>

    <div class="footer">
      <input type="checkbox" id="domainToggle">
      <label class="toggle-label" for="domainToggle">Disable on this domain</label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
